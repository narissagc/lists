<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Lists</title>
  <style>
    :root {
      --bg: #F5F4F0;
      --surface: #FFFFFF;
      --surface2: #EFEFEB;
      --border: #E2E0D8;
      --text: #1A1A1A;
      --text-muted: #8A8880;
      --amber: #E8A838;
      --amber-light: #FFF3D6;
      --amber-dark: #C48820;
      --purple: #8B6BB5;
      --purple-light: #F0EBFF;
      --teal: #4AADA8;
      --teal-light: #E4F7F6;
      --red: #E05252;
      --red-light: #FFEBEB;
      --green: #52A878;
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --tab-h: 56px;
      --header-h: 56px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ── APP SHELL ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: var(--safe-top);
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .header-actions {
      display: flex;
      gap: 4px;
    }
    .icon-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 20px;
      transition: background 0.15s;
    }
    .icon-btn:active { background: var(--surface2); }

    /* ── STORE TABS ── */
    #tab-bar {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 12px;
      gap: 6px;
      height: 52px;
      align-items: center;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      scroll-snap-type: x mandatory;
    }
    #tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      height: 36px;
      padding: 0 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      scroll-snap-align: start;
      min-width: 44px;
    }
    .tab-btn.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    /* ── SWIPEABLE VIEWS ── */
    #views-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #views-track {
      display: flex;
      height: 100%;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    .store-view {
      width: 100%;
      flex-shrink: 0;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding-bottom: calc(var(--safe-bottom) + 16px);
    }

    /* ── SECTIONS ── */
    .section {
      padding: 16px 16px 8px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }
    .section-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* ── LIST CARDS ── */
    .list-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── ACTIVE LIST ── */
    .active-item {
      display: flex;
      align-items: center;
      min-height: 52px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      gap: 12px;
    }
    .active-item:last-child { border-bottom: none; }
    .active-item:active { background: var(--surface2); }

    .check-circle {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin: 9px 0;
    }
    .active-item.checked .check-circle {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
      font-size: 13px;
    }
    .active-item-name {
      flex: 1;
      font-size: 16px;
      font-weight: 450;
      transition: all 0.15s;
      padding: 14px 0;
    }
    .active-item.checked .active-item-name {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .end-trip-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 12px 16px 0;
      width: calc(100% - 32px);
      height: 48px;
      border-radius: 14px;
      border: none;
      background: var(--teal-light);
      color: var(--teal);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .end-trip-btn:active { opacity: 0.7; }

    /* ── MASTER INVENTORY ── */
    .pool-item {
      display: flex;
      align-items: center;
      min-height: 52px;
      padding: 0 4px 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .pool-item:last-child { border-bottom: none; }

    .pool-add-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      padding: 14px 0;
      min-height: 44px;
      transition: opacity 0.15s;
    }
    .pool-add-btn:active { opacity: 0.5; }

    .pool-item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--amber);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .pool-item.in-active .pool-item-dot {
      background: var(--teal);
    }
    .pool-item-name {
      font-size: 16px;
      font-weight: 450;
      color: var(--text);
      transition: color 0.15s;
    }
    .pool-item.in-active .pool-item-name {
      color: var(--teal);
    }

    .active-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--teal);
      background: var(--teal-light);
      padding: 2px 7px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .pool-item.in-active .active-badge { opacity: 1; }

    .pool-delete-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 18px;
      border-radius: 10px;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .pool-delete-btn:active { background: var(--red-light); color: var(--red); }

    /* ── ADD NEW ITEM BTN ── */
    .add-item-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 10px 16px 0;
      width: calc(100% - 32px);
      height: 48px;
      border-radius: 14px;
      border: 1.5px dashed var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-item-btn:active { background: var(--surface2); }

    /* ── EMPTY STATES ── */
    .empty-state {
      padding: 28px 20px;
      text-align: center;
    }
    .empty-state-icon { font-size: 36px; margin-bottom: 8px; }
    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── BOTTOM SHEET ── */
    #sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }
    #sheet-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    #bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 12px 16px calc(var(--safe-bottom) + 24px);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 101;
    }
    #bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 40px;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin: 0 auto 20px;
    }
    .sheet-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }
    .sheet-input {
      width: 100%;
      height: 50px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-size: 16px;
      padding: 0 16px;
      color: var(--text);
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .sheet-input:focus { border-color: var(--purple); }

    .sheet-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .sheet-cancel {
      flex: 1;
      height: 50px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .sheet-add {
      flex: 2;
      height: 50px;
      border-radius: 14px;
      border: none;
      background: var(--purple);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .sheet-add:active { opacity: 0.8; }

    /* ── SETTINGS PANEL ── */
    #settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }
    #settings-overlay.visible { opacity: 1; pointer-events: all; }

    #settings-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 12px 16px calc(var(--safe-bottom) + 24px);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 101;
    }
    #settings-panel.open { transform: translateY(0); }
    .settings-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 52px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      border-radius: 8px;
      padding: 0 4px;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row:active { background: var(--surface2); }
    .settings-row-left { display: flex; align-items: center; gap: 12px; }
    .settings-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .settings-label { font-size: 16px; font-weight: 500; }
    .settings-chevron { color: var(--text-muted); font-size: 18px; }

    /* ── WAKE LOCK INDICATOR ── */
    #wake-indicator {
      position: fixed;
      top: calc(var(--safe-top) + 24px);
      right: 70px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 50;
      box-shadow: 0 0 6px var(--green);
    }
    #wake-indicator.active { opacity: 1; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 20px;
      z-index: 200;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── HIDDEN ── */
    #file-input { display: none; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <h1>Lists</h1>
    <div class="header-actions">
      <button class="icon-btn" id="settings-btn" title="Settings">⚙️</button>
    </div>
  </header>

  <div id="tab-bar"></div>

  <div id="views-wrapper">
    <div id="views-track"></div>
  </div>
</div>

<div id="wake-indicator"></div>

<div id="sheet-overlay"></div>
<div id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">Add to Inventory</div>
  <input class="sheet-input" id="sheet-input" type="text" placeholder="Item name…" autocomplete="off" autocorrect="off" spellcheck="false" />
  <div class="sheet-actions">
    <button class="sheet-cancel" id="sheet-cancel">Cancel</button>
    <button class="sheet-add" id="sheet-add-btn">Add Item</button>
  </div>
</div>

<div id="settings-overlay"></div>
<div id="settings-panel">
  <div class="sheet-handle"></div>
  <div class="settings-title">Settings & Backup</div>
  <div class="settings-row" id="export-btn">
    <div class="settings-row-left">
      <div class="settings-icon" style="background:#FFF3D6">📤</div>
      <span class="settings-label">Export Backup</span>
    </div>
    <span class="settings-chevron">›</span>
  </div>
  <div class="settings-row" id="import-btn">
    <div class="settings-row-left">
      <div class="settings-icon" style="background:#F0EBFF">📥</div>
      <span class="settings-label">Import Backup</span>
    </div>
    <span class="settings-chevron">›</span>
  </div>
  <div class="settings-row" id="reset-btn">
    <div class="settings-row-left">
      <div class="settings-icon" style="background:#FFEBEB">🔄</div>
      <span class="settings-label">Reset to Defaults</span>
    </div>
    <span class="settings-chevron">›</span>
  </div>
</div>

<input type="file" id="file-input" accept=".json" />

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIGURATION
// ══════════════════════════════════════════════
const APP_CONFIG = {
  stores: ["Costco", "Wegman's", "Whole Foods"],
  starterItems: {
    "Costco": ["Bananas", "Eggs"],
    "Wegman's": ["Bananas", "Cereal"],
    "Whole Foods": ["Bananas", "Peanuts", "Scones"]
  }
};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let state = { stores: {} };
let currentStore = 0;
let wakeLock = null;

// ══════════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════════
function loadState() {
  const saved = localStorage.getItem('lists_app_v1');
  if (saved) {
    state = JSON.parse(saved);
  } else {
    seedState();
  }
}

function seedState() {
  state = { stores: {} };
  APP_CONFIG.stores.forEach(name => {
    state.stores[name] = {
      pool: (APP_CONFIG.starterItems[name] || []).map(item => ({
        id: uid(), name: item
      })),
      active: []
    };
  });
  saveState();
}

function saveState() {
  localStorage.setItem('lists_app_v1', JSON.stringify(state));
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

// ══════════════════════════════════════════════
//  WAKE LOCK
// ══════════════════════════════════════════════
async function updateWakeLock() {
  const hasActiveUnchecked = APP_CONFIG.stores.some(name => {
    const s = state.stores[name];
    return s && s.active.some(i => !i.checked);
  });

  if (hasActiveUnchecked) {
    if (!wakeLock && 'wakeLock' in navigator) {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
        document.getElementById('wake-indicator').classList.add('active');
      } catch(e) {}
    }
  } else {
    if (wakeLock) {
      wakeLock.release();
      wakeLock = null;
    }
    document.getElementById('wake-indicator').classList.remove('active');
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') updateWakeLock();
});

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function render() {
  renderTabs();
  renderTrack();
  updateWakeLock();
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  APP_CONFIG.stores.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === currentStore ? ' active' : '');
    btn.textContent = name;
    btn.addEventListener('click', () => switchStore(i));
    bar.appendChild(btn);
  });
}

function renderTrack() {
  const track = document.getElementById('views-track');
  track.style.width = `${APP_CONFIG.stores.length * 100}%`;
  track.innerHTML = '';

  APP_CONFIG.stores.forEach((name, i) => {
    const view = document.createElement('div');
    view.className = 'store-view';
    view.style.width = `${100 / APP_CONFIG.stores.length}%`;
    view.innerHTML = buildStoreHTML(name);
    track.appendChild(view);
  });

  positionTrack(false);
  bindStoreEvents();
}

function buildStoreHTML(storeName) {
  const s = state.stores[storeName] || { pool: [], active: [] };
  const activeIds = new Set(s.active.map(a => a.poolId));
  let html = '';

  // ── Active List ──
  html += `<div class="section">
    <div class="section-header">
      <span class="section-title">Shopping List</span>
      ${s.active.length ? `<span class="section-count">${s.active.length}</span>` : ''}
    </div>`;

  if (s.active.length) {
    html += `<div class="list-card">`;
    s.active.forEach(item => {
      html += `<div class="active-item${item.checked ? ' checked' : ''}" data-active-id="${item.id}" data-store="${storeName}">
        <div class="check-circle">${item.checked ? '✓' : ''}</div>
        <span class="active-item-name">${escHtml(item.name)}</span>
      </div>`;
    });
    html += `</div>`;
    html += `<button class="end-trip-btn" data-store="${storeName}">
      <span>✓</span> End Trip
    </button>`;
  } else {
    html += `<div class="list-card">
      <div class="empty-state">
        <div class="empty-state-icon">🛒</div>
        <p>Tap items below to add them to your list</p>
      </div>
    </div>`;
  }
  html += `</div>`;

  // ── Master Inventory ──
  html += `<div class="section">
    <div class="section-header">
      <span class="section-title">Master Inventory</span>
      <span class="section-count">${s.pool.length}</span>
    </div>`;

  if (s.pool.length) {
    html += `<div class="list-card">`;
    s.pool.forEach(item => {
      const inActive = activeIds.has(item.id);
      html += `<div class="pool-item${inActive ? ' in-active' : ''}" data-pool-id="${item.id}" data-store="${storeName}">
        <button class="pool-add-btn" data-pool-id="${item.id}" data-store="${storeName}" aria-label="Add ${escHtml(item.name)} to list">
          <span class="pool-item-dot"></span>
          <span class="pool-item-name">${escHtml(item.name)}</span>
          <span class="active-badge">ON LIST</span>
        </button>
        <button class="pool-delete-btn" data-pool-id="${item.id}" data-store="${storeName}" aria-label="Remove from inventory">×</button>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="list-card">
      <div class="empty-state">
        <div class="empty-state-icon">📝</div>
        <p>No items yet. Add one below.</p>
      </div>
    </div>`;
  }
  html += `</div>`;

  // ── Add button ──
  html += `<button class="add-item-btn" data-store="${storeName}">＋ Add Item to Inventory</button>`;

  return html;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function positionTrack(animate = true) {
  const track = document.getElementById('views-track');
  if (!animate) track.style.transition = 'none';
  track.style.transform = `translateX(${-currentStore * (100 / APP_CONFIG.stores.length)}%)`;
  if (!animate) requestAnimationFrame(() => { track.style.transition = ''; });
}

function bindStoreEvents() {
  // Active items — toggle check
  document.querySelectorAll('.active-item').forEach(el => {
    el.addEventListener('click', () => {
      const store = el.dataset.store;
      const id = el.dataset.activeId;
      const s = state.stores[store];
      const item = s.active.find(a => a.id === id);
      if (item) {
        item.checked = !item.checked;
        saveState();
        rerenderStore(store);
        updateWakeLock();
      }
    });
  });

  // End trip buttons
  document.querySelectorAll('.end-trip-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const store = btn.dataset.store;
      const s = state.stores[store];
      s.active = s.active.filter(i => !i.checked);
      saveState();
      rerenderStore(store);
      updateWakeLock();
      showToast('Trip ended — unchecked items kept');
    });
  });

  // Pool add buttons
  document.querySelectorAll('.pool-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const store = btn.dataset.store;
      const poolId = btn.dataset.poolId;
      const s = state.stores[store];
      const already = s.active.find(a => a.poolId === poolId);
      if (already) {
        s.active = s.active.filter(a => a.poolId !== poolId);
        showToast('Removed from list');
      } else {
        const poolItem = s.pool.find(p => p.id === poolId);
        if (poolItem) {
          s.active.push({ id: uid(), poolId: poolId, name: poolItem.name, checked: false });
          showToast(`Added to list`);
        }
      }
      saveState();
      rerenderStore(store);
      updateWakeLock();
    });
  });

  // Pool delete buttons
  document.querySelectorAll('.pool-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const store = btn.dataset.store;
      const poolId = btn.dataset.poolId;
      const s = state.stores[store];
      s.pool = s.pool.filter(p => p.id !== poolId);
      s.active = s.active.filter(a => a.poolId !== poolId);
      saveState();
      rerenderStore(store);
    });
  });

  // Add item buttons
  document.querySelectorAll('.add-item-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      openSheet(btn.dataset.store);
    });
  });
}

function rerenderStore(storeName) {
  const idx = APP_CONFIG.stores.indexOf(storeName);
  const views = document.querySelectorAll('.store-view');
  if (views[idx]) {
    views[idx].innerHTML = buildStoreHTML(storeName);
    bindStoreEvents();
  }
}

// ══════════════════════════════════════════════
//  STORE SWITCHING
// ══════════════════════════════════════════════
function switchStore(idx) {
  currentStore = idx;
  positionTrack();
  renderTabs();
}

// ══════════════════════════════════════════════
//  SWIPE GESTURES
// ══════════════════════════════════════════════
let touchStartX = 0, touchStartY = 0, touchDx = 0;
let isHorizontalSwipe = null;
const SWIPE_THRESHOLD = 50;

const wrapper = document.getElementById('views-wrapper');
wrapper.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchDx = 0;
  isHorizontalSwipe = null;
}, { passive: true });

wrapper.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (isHorizontalSwipe === null) {
    if (Math.abs(dx) > Math.abs(dy) + 5) isHorizontalSwipe = true;
    else if (Math.abs(dy) > Math.abs(dx) + 5) isHorizontalSwipe = false;
  }
  if (isHorizontalSwipe) {
    touchDx = dx;
    e.preventDefault();
  }
}, { passive: false });

wrapper.addEventListener('touchend', () => {
  if (!isHorizontalSwipe) return;
  if (touchDx < -SWIPE_THRESHOLD && currentStore < APP_CONFIG.stores.length - 1) {
    switchStore(currentStore + 1);
  } else if (touchDx > SWIPE_THRESHOLD && currentStore > 0) {
    switchStore(currentStore - 1);
  }
  touchDx = 0;
  isHorizontalSwipe = null;
}, { passive: true });

// ══════════════════════════════════════════════
//  BOTTOM SHEET
// ══════════════════════════════════════════════
let sheetTargetStore = null;

function openSheet(storeName) {
  sheetTargetStore = storeName;
  document.getElementById('sheet-title').textContent = `Add to ${storeName}`;
  document.getElementById('sheet-input').value = '';
  document.getElementById('sheet-overlay').classList.add('visible');
  const sheet = document.getElementById('bottom-sheet');
  sheet.classList.add('open');
  setTimeout(() => {
    document.getElementById('sheet-input').focus();
  }, 350);
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('visible');
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('sheet-input').blur();
  sheetTargetStore = null;
}

document.getElementById('sheet-overlay').addEventListener('click', closeSheet);
document.getElementById('sheet-cancel').addEventListener('click', closeSheet);

document.getElementById('sheet-add-btn').addEventListener('click', addItemFromSheet);
document.getElementById('sheet-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItemFromSheet();
});

function addItemFromSheet() {
  const val = document.getElementById('sheet-input').value.trim();
  if (!val || !sheetTargetStore) return;
  const s = state.stores[sheetTargetStore];
  if (!s) return;
  
  if (s.pool.some(p => p.name.toLowerCase() === val.toLowerCase())) {
    showToast('Item already in inventory');
    return;
  }
  const newItem = { id: uid(), name: val };
  s.pool.push(newItem);
  saveState();
  rerenderStore(sheetTargetStore);
  closeSheet();
  showToast(`"${val}" added to inventory`);
}

// ══════════════════════════════════════════════
//  SETTINGS PANEL
// ══════════════════════════════════════════════
function openSettings() {
  document.getElementById('settings-overlay').classList.add('visible');
  document.getElementById('settings-panel').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('visible');
  document.getElementById('settings-panel').classList.remove('open');
}

document.getElementById('settings-btn').addEventListener('click', openSettings);
document.getElementById('settings-overlay').addEventListener('click', closeSettings);

// Export
document.getElementById('export-btn').addEventListener('click', () => {
  const date = new Date().toISOString().slice(0,10);
  const data = {};
  for (let k in localStorage) {
    if (localStorage.hasOwnProperty(k)) data[k] = localStorage.getItem(k);
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lists-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  closeSettings();
  showToast('Backup exported');
});

// Import
document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
  closeSettings();
});
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      localStorage.clear();
      for (let k in data) localStorage.setItem(k, data[k]);
      loadState();
      render();
      showToast('Backup restored');
    } catch {
      showToast('Invalid backup file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Reset all data and restore default items? This cannot be undone.')) {
    localStorage.clear();
    seedState();
    render();
    closeSettings();
    showToast('Reset to defaults');
  }
});

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
loadState();
render();
</script>
</body>
</html>
